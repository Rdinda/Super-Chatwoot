# Gateway Swarm: use nomes curtos do compose (backend / frontend) na rede overlay
# interna do stack (kanbancw_gw). Redes externas (minha_rede) costumam não expor aliases
# como kanbancw_*; o DNS interno do stack resolve backend/frontend nesta rede.
# resolver 127.0.0.11 + proxy_pass com variável = resolução na requisição.

resolver 127.0.0.11 valid=10s ipv6=off;

server {
  listen 80;
  server_name _;
  client_max_body_size 80M;

  location ~ ^/(api|webhooks|health|dashboard-script)(/|$) {
    set $kanban_backend "backend:3000";
    proxy_pass http://$kanban_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
  }

  location /socket.io {
    set $kanban_backend "backend:3000";
    proxy_pass http://$kanban_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 86400;
  }

  location / {
    set $kanban_frontend "frontend:80";
    proxy_pass http://$kanban_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
