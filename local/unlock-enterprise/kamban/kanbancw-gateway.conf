# Gateway único: UI + API na mesma origem (localhost:8080 ou domínio público).
upstream kanbancw_frontend_upstream {
  server kanbancw_frontend:80;
  keepalive 8;
}
upstream kanbancw_backend_upstream {
  server kanbancw_backend:3000;
  keepalive 8;
}

server {
  listen 80;
  server_name _;
  client_max_body_size 80M;

  location ~ ^/(api|webhooks|health|dashboard-script)(/|$) {
    proxy_pass http://kanbancw_backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
  }

  location /socket.io {
    proxy_pass http://kanbancw_backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 86400;
  }

  location / {
    proxy_pass http://kanbancw_frontend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
