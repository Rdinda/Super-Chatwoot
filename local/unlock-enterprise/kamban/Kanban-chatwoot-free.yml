# KanbanCW — nova versão (abr/2026), alinhada ao stack atual em ../Kanban-chatwoot-free.yml
#
# - Imagens: astraonline/kanbanback:1.0.2 + kanbanfront:1.0.2
# - Postgres Kanban: mesmo cluster do Chatwoot (pgvector Swarm: postgrespgvector_postgrespgvector).
#   Criar DB/usuário com init-kanbancw.sh (volume novo no pgvector ou exec manual no container).
# - Redis: stack redis (redis_redis:6379) na overlay minha_rede.
# - Entrada: gateway Nginx :8080 (UI + /api na mesma origem). Arquivo: ./kanbancw-gateway.conf
#
# Deploy (nesta pasta):
#   docker stack deploy -c Kanban-chatwoot-free.yml <nome_do_stack>
#
# Swarm: Docker Config é imutável. Se mudar kanbancw-gateway.conf e o deploy falhar com
# "only updates to Labels are allowed", altere o nome em configs: (ex. kanbancw_gateway_conf_v3).
#
# Rede: overlay interna kanbancw_gw (criada pelo stack) para o gateway resolver backend/frontend pelos
# nomes curtos do compose. minha_rede (externa) liga backend ao Postgres/Redis; aliases em rede externa
# costumam falhar no DNS do Swarm.
#
# Produção (HTTPS + domínio): troque os valores do anchor (localhost → URLs reais), ajuste
# VITE_API_URL/API_URL para a URL pública do Kanban, e use Traefik ou outro proxy em vez do gateway se preferir.
#
# Opcional no backend (se a imagem suportar): CHATWOOT_PLATFORM_API_TOKEN, WAHA_*

x-kanbancw-config: &kanbancw-config
  KANBANCW_DOMAIN: localhost
  CHATWOOT_DOMAIN: localhost
  KANBANCW_URL: http://localhost:8080
  CHATWOOT_API_URL: http://localhost:3000
  CORS_ORIGIN: http://localhost:8080,http://localhost:3000
  EVOLUTION_API_URL: http://localhost:8081
  EVOLUTION_API_KEY: key_global_evolution

configs:
  # Renomeie o recurso sempre que alterar o arquivo; configs Swarm não podem ser atualizados in-place.
  kanbancw_gateway_conf_v3:
    file: ./kanbancw-gateway.conf

services:
  gateway:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    networks:
      - kanbancw_gw
    configs:
      - source: kanbancw_gateway_conf_v3
        target: /etc/nginx/conf.d/default.conf
    deploy:
      mode: replicated
      replicas: 1
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      placement:
        constraints:
          - node.role == manager

  backend:
    image: astraonline/kanbanback:1.0.2
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: info
      DATABASE_URL: ${KANBAN_DATABASE_URL:-postgresql://kanbancw:kanbancw_secret_2024@postgrespgvector_postgrespgvector:5432/kanbancw?schema=public}
      CHATWOOT_DATABASE_URL: ${CHATWOOT_DATABASE_URL:-postgresql://postgres:Mfcd62%21%21Mfcd62%21%21@postgrespgvector_postgrespgvector:5432/chatwoot?schema=public}
      REDIS_URL: redis://redis_redis:6379/0
      REDIS_HOST: redis_redis
      REDIS_PORT: "6379"
      UPLOAD_DIR: /app/uploads
      <<: *kanbancw-config
    volumes:
      - kanbancw-uploads:/app/uploads
    networks:
      - kanbancw_gw
      - minha_rede
    deploy:
      mode: replicated
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      placement:
        constraints:
          - node.role == manager

  frontend:
    image: astraonline/kanbanfront:1.0.2
    environment:
      - VITE_API_URL=http://localhost:8080
      - API_URL=http://localhost:8080
    networks:
      - kanbancw_gw
      - minha_rede
    deploy:
      mode: replicated
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      placement:
        constraints:
          - node.role == manager

volumes:
  kanbancw-uploads:
    external: true
    name: kanbancw-uploads

networks:
  kanbancw_gw:
    driver: overlay
    attachable: false
  minha_rede:
    external: true
    name: minha_rede
