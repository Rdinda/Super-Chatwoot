version: "3.7"

# init-kanbancw.sh: cria usuário/DB Kanban (idempotente) na 1ª inicialização (volume novo).
# Volume já com dados: docker exec -i <container_pgvector> sh -s < init-kanbancw.sh
# Deploy Swarm: rode stack deploy a partir da pasta local/ para o bind mount ./init-kanbancw.sh resolver.
# Em Windows, mantenha init-kanbancw.sh com finais de linha LF (ver local/.gitattributes); CRLF quebra o sh no Linux.

services:
  postgrespgvector:
    image: astraonline/postgrespgvector:2024
    environment:
      - POSTGRES_PASSWORD=Mfcd62!!Mfcd62!!
      - POSTGRES_DB=chatwoot
    networks:
      - minha_rede
    ports:
      - 5436:5432
    volumes:
      - postgrespgvector:/var/lib/postgresql/data
      - ./init-kanbancw.sh:/docker-entrypoint-initdb.d/99-kanbancw.sh:ro
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 1024M

volumes:
  postgrespgvector:
    external: true
    name: postgrespgvector

networks:
  minha_rede:
    external: true
    name: minha_rede

