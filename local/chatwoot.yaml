version: "3.7"

##############
#
# Swarm: POSTGRES_HOST / REDIS_URL usam <stack>_<serviço>. Ajuste se seus
# stacks não forem deployados como: postgrespgvector + postgrespgvector, redis + redis.
#
# Banco: stack postgrespgvector (pgvector). O stack postgres fica para n8n/outros.
#
# Não monte volume em /app/public: a imagem já traz os bundles Vite (superadmin, etc.);
# um volume vazio substitui o manifest e gera erro "can't find entrypoints/superadmin.js".
#
#############

services:
  chatwoot_app:
    image: chatwoot/chatwoot:v4.13.0
    # Prepara o banco antes do boot (sem isso o Rails quebra ao ler installation_configs).
    command: >
      sh -c "bundle exec rails db:chatwoot_prepare && bundle exec rails s -p 3000 -b 0.0.0.0"
    entrypoint: docker/entrypoints/rails.sh
    ports:
      - "3000:3000"
    volumes:
      - chatwoot_data:/app/storage
    configs:
      # Patches de desbloqueio do Enterprise injetados pelo Swarm
      - source: unlock_enterprise_init
        target: /app/config/initializers/zz_unlock_enterprise.rb
        mode: 0444
      - source: unlock_enterprise_premium_features
        target: /app/enterprise/config/premium_features.yml
        mode: 0444
    networks:
      - minha_rede
    environment:
      - INSTALLATION_NAME=chatwoot
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      - SECRET_KEY_BASE=123458bb7ef6402f6a8bcf5d3be54321
      - FRONTEND_URL=http://localhost:3000
      - DEFAULT_LOCALE=pt_BR
      - FORCE_SSL=false
      - ENABLE_ACCOUNT_SIGNUP=true
      # Swarm: host = <nome_do_stack>_<nome_do_serviço> na mesma overlay (ex.: stack redis + serviço redis).
      - REDIS_URL=redis://redis_redis:6379
      - POSTGRES_HOST=postgrespgvector_postgrespgvector
      - POSTGRES_USERNAME=postgres
      - POSTGRES_PASSWORD=Mfcd62!!Mfcd62!!
      - POSTGRES_DATABASE=chatwoot
      - ACTIVE_STORAGE_SERVICE=local
      - RAILS_LOG_TO_STDOUT=true
      - USE_INBOX_AVATAR_FOR_BOT=true
      # Enterprise unlock (lidos pelo ChatwootApp/ChatwootHub e pelo initializer)
      - INSTALLATION_PRICING_PLAN=enterprise
      - INSTALLATION_PRICING_PLAN_QUANTITY=10000
      - DISABLE_TELEMETRY=true
      # Servidor de Email Gmail
      - MAILER_SENDER_EMAIL=Chatwoot <noreply@localhost>
      - SMTP_DOMAIN=zoho.com
      - SMTP_ADDRESS=smtp.zoho.com
      - SMTP_PORT=587
      - SMTP_USERNAME=noreply@localhost
      - SMTP_PASSWORD=Mfcd62!!Mfcd62!!
      - SMTP_AUTHENTICATION=login
      - SMTP_ENABLE_STARTTLS_AUTO=true
      - SMTP_OPENSSL_VERIFY_MODE=peer
      - MAILER_INBOUND_EMAIL_DOMAIN=localhost
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
      update_config:
        parallelism: 1
        delay: 10s
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 2048M

  chatwoot_sidekiq:
    image: chatwoot/chatwoot:v4.13.0
    command: bundle exec sidekiq -C config/sidekiq.yml
    volumes:
      - chatwoot_data:/app/storage
    configs:
      # Patches de desbloqueio do Enterprise injetados pelo Swarm
      - source: unlock_enterprise_init
        target: /app/config/initializers/zz_unlock_enterprise.rb
        mode: 0444
      - source: unlock_enterprise_premium_features
        target: /app/enterprise/config/premium_features.yml
        mode: 0444
    networks:
      - minha_rede
    environment:
      - INSTALLATION_NAME=chatwoot
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      - SECRET_KEY_BASE=123458bb7ef6402f6a8bcf5d3be54321
      - FRONTEND_URL=http://localhost:3000
      - DEFAULT_LOCALE=pt_BR
      - FORCE_SSL=false
      - ENABLE_ACCOUNT_SIGNUP=true
      # Swarm: host = <nome_do_stack>_<nome_do_serviço> na mesma overlay (ex.: stack redis + serviço redis).
      - REDIS_URL=redis://redis_redis:6379
      - POSTGRES_HOST=postgrespgvector_postgrespgvector
      - POSTGRES_USERNAME=postgres
      - POSTGRES_PASSWORD=Mfcd62!!Mfcd62!!
      - POSTGRES_DATABASE=chatwoot
      - ACTIVE_STORAGE_SERVICE=local
      - RAILS_LOG_TO_STDOUT=true
      - USE_INBOX_AVATAR_FOR_BOT=true
      # Enterprise unlock (lidos pelo ChatwootApp/ChatwootHub e pelo initializer)
      - INSTALLATION_PRICING_PLAN=enterprise
      - INSTALLATION_PRICING_PLAN_QUANTITY=10000
      - DISABLE_TELEMETRY=true
      # Servidor de Email Gmail
      - MAILER_SENDER_EMAIL=Chatwoot <noreply@localhost>
      - SMTP_DOMAIN=zoho.com
      - SMTP_ADDRESS=smtp.zoho.com
      - SMTP_PORT=587
      - SMTP_USERNAME=noreply@localhost
      - SMTP_PASSWORD=Mfcd62!!Mfcd62!!
      - SMTP_AUTHENTICATION=login
      - SMTP_ENABLE_STARTTLS_AUTO=true
      - SMTP_OPENSSL_VERIFY_MODE=peer
      - MAILER_INBOUND_EMAIL_DOMAIN=localhost
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
      update_config:
        parallelism: 1
        delay: 10s
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 2048M

volumes:
  chatwoot_data:
    external: true
    name: chatwoot_data

configs:
  unlock_enterprise_init:
    file: ./unlock-enterprise/config/initializers/zz_unlock_enterprise.rb
  unlock_enterprise_premium_features:
    file: ./unlock-enterprise/enterprise/config/premium_features.yml

networks:
  minha_rede:
    external: true
    name: minha_rede
