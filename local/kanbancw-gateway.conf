# Gateway Swarm: resolver DNS do Docker + proxy_pass com variável (evita "host not found" no boot).

resolver 127.0.0.11 valid=10s ipv6=off;

server {
  listen 80;
  server_name _;
  client_max_body_size 80M;

  location ~ ^/(api|webhooks|health|dashboard-script)(/|$) {
    set $kanban_backend "kanbancw_backend:3000";
    proxy_pass http://$kanban_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
  }

  location /socket.io {
    set $kanban_backend "kanbancw_backend:3000";
    proxy_pass http://$kanban_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 86400;
  }

  location / {
    set $kanban_frontend "kanbancw_frontend:80";
    proxy_pass http://$kanban_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
